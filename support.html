    <h2>常見問題</h2>

    <h2>Q：V 點怎麼賺？</h2>
    <p>完成每日菜單的每一樣菜都會得到 V 點，全數完成有額外獎勵；完成好友挑戰、雙人菜單、連續 7 天達成也有獎勵。目前 V 點完全免費，不需課金。未來計畫 V 點可以購買。</p>

    <h2>Q：怎麼加好友？</h2>
    <p>「我的」頁面有你的 6 碼邀請碼，把它分享給朋友；輸入對方的邀請碼即可互加好友。</p>

    <h2>Q：隨機抽到不吃的菜怎麼辦？</h2>
    <p>先到「我的 → 我不吃的菜」設定，之後的隨機抽菜與好友挑戰都不會出現這些菜。當天也可以免費重抽一次，或用 V 點換菜。</p>
